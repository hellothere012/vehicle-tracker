services:
  - type: web
    name: autotrader-scraper-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        generateValue: true
      - key: AUTOTRADER_URL
        value: "https://www.autotrader.com/cars-for-sale/private-seller"
      - key: SCRAPE_TIMEOUT
        value: 120000
      - key: HEADLESS
        value: "True"
